<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {background-color: white; text-align: center;}
        .cabeza{color: mediumseagreen;background-color: blueviolet; border-radius: 9px ;height: 9vh;}
        .aguamarina{background-color:cadetblue ; margin-top: 3px;border-radius: 9px;}
        .verdeclaro{background-color: aquamarine;border-radius: 9px;margin-top: 4px; padding-bottom: 15px;padding-top: 0.5px; flex: 3;}
        .rojo{background-color: rgb(163, 18, 18); color: white; text-align: left; margin-left: 10px; padding: 9px;border-radius: 8px;margin-top: 5px;font-size: 10px; margin-left: 15px;margin-right: 6px;}
        .beige{background-color: rgb(210, 164, 107); flex: 1; border-radius: 8px; margin-top: 4px ;margin-left: 10px;}
        .main{display: flex;}
        .vomito{background-color:darkolivegreen ; margin-top: 3px; border-radius:8px;}
    </style>
</head>
<body>
    <div class="cabeza">Ejemplo de maquetacion</div>

    <div  class="aguamarina"><br><br><br></div>
    <div class="main">
    <div class="verdeclaro">
        <div class="rojo"><strong>articulo 1</strong> <br><br><br><br></div>
        <div class="rojo"><strong>articulo 2</strong> <br><br><br><br></div>
        <div class="rojo"><strong>articulo 3</strong> <br><br><br><br></div>
        <div class="rojo"><strong>articulo 4</strong> <br><br><br><br></div>
        <div class="rojo"><strong>articulo 5</strong> <br><br><br><br></div>
        </div>
        <div class="beige"></div>
    </div>
    <div class="vomito"><br><br><br><br><br><br><br><br></div>
</body>
</html>
