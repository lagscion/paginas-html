<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .daddy{background-color: wheat;display: grid;grid-template-areas: "naranja azul morado" ;grid-template-columns: 1fr 1fr 1fr;gap: 10px;height: 30vh;padding: 10px;width: 70vh;}
        .naranja{background-color: rgb(255, 115, 0); grid-area: naranja;}
        .aqua{background-color:rgb(56, 103, 104);grid-area: azul;}
        .purple{background-color:rgb(92, 5, 92);grid-area: morado;}
    </style>
</head>
<body>
    <div class="daddy"> 
        <div class="naranja"></div>
        <div class="aqua"></div>
        <div class="purple"></div>
    </div>
</body>
</html>
